# ============================================================================
# TMUX CONFIGURATION
# ============================================================================

# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable xterm keys
set-window-option -g xterm-keys on

# Increase history limit
set -g history-limit 10000

# Enable mouse support (modern tmux feature)
set -g mouse on

# Start window and pane numbering at 1 (more ergonomic than 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape time for better vim experience
set -sg escape-time 0

# Increase repeat time for repeatable commands
set -g repeat-time 600

# Focus events enabled for terminals that support them
set -g focus-events on

# ----------------------------------------------------------------------------
# Window & Pane Settings
# ----------------------------------------------------------------------------

# Automatically rename windows based on running program
set-window-option -g automatic-rename on

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string '#S:#I:#W - "#T"'

# Monitor window activity
setw -g monitor-activity on
set -g visual-activity off

# ----------------------------------------------------------------------------
# Key Bindings - Vi Mode
# ----------------------------------------------------------------------------

# Use vi mode for status line
set -g status-keys vi

# Use vi mode for copy mode
setw -g mode-keys vi

# Vi-style copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# ----------------------------------------------------------------------------
# Key Bindings - Pane Management
# ----------------------------------------------------------------------------

# Split panes with more intuitive keys
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Alternative split bindings
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation (with prefix)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim-style pane navigation (without prefix - Alt+hjkl)
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Arrow key pane navigation (without prefix - Alt+arrows)
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D

# Resize panes with vim keys
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ----------------------------------------------------------------------------
# Key Bindings - Window Management
# ----------------------------------------------------------------------------

# Navigate windows with Shift+arrows (without prefix)
bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# Create new window with current path
bind-key c new-window -c "#{pane_current_path}"

# ----------------------------------------------------------------------------
# Key Bindings - Session Management
# ----------------------------------------------------------------------------

# Quick reload of config file
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Safely source tmuxline only if it exists
if-shell "[ -f ~/.tmux-status.conf ]" "source-file ~/.tmux-status.conf"
