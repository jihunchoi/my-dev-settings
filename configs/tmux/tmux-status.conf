# -----------------------------------------------------------------------------
# Solarized Light Status (Optimized for Hack Nerd Font)
# -----------------------------------------------------------------------------

set -g status-style "bg=#eee8d5,fg=#657b83"
set -g status-left-length "100"
set -g status-right-length "100"

# LEFT: Session Block
set -g status-left "#[fg=#fdf6e3,bg=#268bd2,bold] #S #[fg=#268bd2,bg=#eee8d5,nobold]"

# WINDOWS
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#eee8d5,bg=#eee8d5]#[fg=#657b83,bg=#eee8d5] #I  #W #[fg=#eee8d5,bg=#eee8d5]"
setw -g window-status-current-format "#[fg=#eee8d5,bg=#93a1a1]#[fg=#fdf6e3,bg=#93a1a1,bold] #I  #W #[fg=#93a1a1,bg=#eee8d5]"

# RIGHT: Mirrored Slants
set -g status-right "#[fg=#93a1a1,bg=#eee8d5]#[fg=#fdf6e3,bg=#93a1a1] %H:%M #[fg=#268bd2,bg=#93a1a1]#[fg=#fdf6e3,bg=#268bd2] #h "
